name: Daily Stock Scraper

on:
  schedule:
    - cron: '30 08 * * *' # 한국 시간 17:30 (장 마감 후)
  workflow_dispatch: # 수동 실행 가능

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일 수정 및 푸시 권한
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # v3에서 v4로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # v4에서 v5로 업데이트
        with:
          python-version: '3.10' # 3.9에서 3.10으로 살짝 상향

      - name: Install dependencies
        run: |
          # pandas의 read_html을 쓰기 위해 lxml 필수, request도 필요합니다
          pip install pandas requests lxml 

      - name: Run script
        run: python update_data.py

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data/investor_data.csv
          # 변경사항이 있을 때만 커밋/푸시하도록 로직 강화
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update stock data" && git push)
