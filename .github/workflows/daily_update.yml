name: Daily Stock Scraper

on:
  schedule:
    - cron: '30 08 * * *' # 한국 시간 17:30 (장 마감 후)
  workflow_dispatch: # 수동 실행 가능

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일 수정 및 푸시 권한
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          # beautifulsoup4를 추가하여 pandas의 HTML 파싱 능력을 보강합니다.
          pip install pandas requests lxml beautifulsoup4

      - name: Run script
        run: python update_data.py

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data/investor_data.csv
          # 변경사항이 있을 때만 커밋/푸시
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update stock data" && git push)
